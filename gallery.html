<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Ocean Animal Gallery</h1>
</header>

<section class="gallery-grid">
    <figure>
        <img src="images/dolphin.jpg" alt="Dolphin">
        <figcaption>Dolphin</figcaption>
    </figure>

    <figure>
        <img src="images/whale.jpg" alt="Whale">
        <figcaption>Whale</figcaption>
    </figure>

    <figure>
        <img src="images/humpback whale.jpg" alt="Humpback Whale">
        <figcaption>Humpback Whale</figcaption>
    </figure>

    <figure>
        <img src="images/marine mammal.jpg" alt="Marine Mammal">
        <figcaption>Marine Mammal</figcaption>
    </figure>

    <figure>
        <img src="images/octopus.jpg" alt="Octopus">
        <figcaption>Octopus</figcaption>
    </figure>

    <figure>
        <img src="images/squid.jpg" alt="Squid">
        <figcaption>Squid</figcaption>
    </figure>
</section>

</body>
</html>
